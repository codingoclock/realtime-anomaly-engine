version: "3.8"

services:
  # ── Single-broker Kafka in KRaft mode (no Zookeeper) ──────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: anomaly-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft identity
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Controller quorum (single-node)
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Topic defaults (1 node → RF must be 1)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # Fixed cluster ID (required for KRaft; generate once with uuidgen)
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"

      # Log retention (compact for demo)
      KAFKA_LOG_RETENTION_HOURS: 12
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Topic initialiser (runs once, exits) ────────────────────────────────────
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: anomaly-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic transactions \
          --partitions 4 \
          --replication-factor 1

        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic scored-events \
          --partitions 4 \
          --replication-factor 1

        echo "Topics created:"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
    restart: "no"

volumes:
  kafka_data:
    driver: local
